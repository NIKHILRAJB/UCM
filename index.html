<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#FFBA00" />
  <title>Ultimate Cricket Manager</title>
  <link rel="icon" type="image/png" href="images/logo_mascot_round.png" />
  <link rel="apple-touch-icon" href="images/logo_mascot_round.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body id="loading-body">

  <div id="screen-loading" class="screen active">
    <div class="loading-wrap">
      
      <img src="images/logo_umc_full_lg_.png"
           alt="Ultimate Cricket Manager"
           class="logo-full-img"
           onerror="this.style.display='none'" />
      <div class="progress-bar-wrap" id="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <p id="loading-status" class="loading-label">LOADING...</p>
      <button id="btn-start" class="btn-start hidden">TAP TO PLAY</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCsmoyzfLBxdACck8jkV245t8AAoDE7GN8",
      authDomain: "ultimate-cricket-manager.firebaseapp.com",
      projectId: "ultimate-cricket-manager",
      storageBucket: "ultimate-cricket-manager.firebasestorage.app",
      messagingSenderId: "939330999487",
      appId: "1:939330999487:web:eeaa137fa6b104e18ea20a"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const bar    = document.getElementById('progress-bar');
    const status = document.getElementById('loading-status');
    const btn    = document.getElementById('btn-start');

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    // Guaranteed step-by-step ~2.6s progress
    async function runProgress() {
      const steps = [
        { pct: 12,  label: 'LOADING...',         ms: 300 },
        { pct: 28,  label: 'LOADING...',         ms: 350 },
        { pct: 45,  label: 'LOADING ASSETS...',  ms: 400 },
        { pct: 60,  label: 'LOADING ASSETS...',  ms: 350 },
        { pct: 74,  label: 'PREPARING GAME...',  ms: 400 },
        { pct: 87,  label: 'ALMOST READY...',    ms: 350 },
        { pct: 95,  label: 'ALMOST READY...',    ms: 250 },
      ];
      for (const s of steps) {
        bar.style.width = s.pct + '%';
        status.textContent = s.label;
        await delay(s.ms);
      }
    }

    // Firebase auth check runs in parallel with progress
    let authUser = null;
    const authCheck = new Promise(resolve => {
      onAuthStateChanged(auth, user => {
        authUser = user;
        resolve();
      });
    });

    // Wait for BOTH progress + auth check to finish
    Promise.all([runProgress(), authCheck]).then(async () => {
      bar.style.width = '100%';
      status.textContent = 'READY!';
      await delay(300);

      // Show TAP TO PLAY button
      status.classList.add('hidden');
      btn.classList.remove('hidden');

      // On tap — check auth and redirect
      btn.addEventListener('click', () => {
        if (authUser) {
          window.location.href = 'menu.html';
        } else {
          window.location.href = 'auth.html';
        }
      });
    });
  </script>

</body>
</html>
