<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1A0D00" />
  <title>Ultimate Cricket Manager</title>
  <link rel="icon" type="image/png" href="images/logo_mascot_round.png" />
  <link rel="apple-touch-icon" href="images/logo_mascot_round.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ===== MAIN MENU SCREEN ===== -->
  <div id="screen-main-menu" class="screen active">

    <!-- Background Image -->
    <div class="menu-bg">
      <img src="images/bg_main_menu.png" alt="" class="menu-bg-img"
           onerror="this.style.display='none'" />
    </div>

    <!-- Header: Mascot + Logo -->
    <div class="menu-header">
      <img src="images/logo_mascot_round.png" alt="UCM Mascot"
           class="menu-mascot" onerror="this.style.opacity='0'" />
      <img src="images/logo_text.png" alt="UCM"
           class="menu-logo-text" onerror="this.outerHTML='<div class=\'menu-logo-fallback\'>UCM</div>'" />
    </div>

    <!-- User Badge -->
    <div class="user-badge" id="user-badge">
      <span id="user-badge-name">👤 ...</span>
      <button class="btn-signout" onclick="confirmSignOut()">Sign Out</button>
    </div>

    <!-- Menu Cards Grid -->
    <div class="menu-grid">

      <button class="menu-card" onclick="navigate('international.html')">
        <div class="menu-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <span class="menu-card-label">International<br>Mode</span>
      </button>

      <button class="menu-card" onclick="navigate('club.html')">
        <div class="menu-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <span class="menu-card-label">Club<br>Mode</span>
      </button>

      <button class="menu-card" onclick="navigate('friendly.html')">
        <div class="menu-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <span class="menu-card-label">Friendly<br>Mode</span>
      </button>

      <button class="menu-card" onclick="navigate('halloffame.html')">
        <div class="menu-card-icon" style="color:#FFBA00">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
            <path d="M4 22h16"/>
            <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
            <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
          </svg>
        </div>
        <span class="menu-card-label">Hall Of<br>Fame</span>
      </button>

      <button class="menu-card" onclick="navigate('settings.html')">
        <div class="menu-card-icon" style="color:#a78bfa">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </div>
        <span class="menu-card-label">Settings</span>
      </button>

      <button class="menu-card" onclick="navigate('about.html')">
        <div class="menu-card-icon" style="color:#93c5fd">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <span class="menu-card-label">About</span>
      </button>

    </div>
  </div>

  <!-- ===== SIGN OUT CONFIRMATION OVERLAY ===== -->
  <div class="overlay hidden" id="signout-overlay">
    <div class="overlay-card">
      <p style="font-size:1.1rem; font-weight:700;">Sign Out?</p>
      <p style="font-size:0.88rem; color:var(--text-muted); margin-top:4px;">
        You will be returned to the login screen.
      </p>
      <div class="overlay-actions">
        <button class="btn-primary"
                
                onclick="doSignOut()">Yes </button>
        <button class="btn-secondary"
                
                onclick="closeSignOutOverlay()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ===== SCRIPTS ===== -->
  <script src="js/menu.js" type="module"></script>

</body>
</html>
